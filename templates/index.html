<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网快传</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="text-center mb-3">局域网快传助手</h2>
    <div class="alert alert-info text-center">
        请让其他设备连接同一 Wi-Fi，并在浏览器访问: <br>
        <strong>http://{{ ip }}:5000</strong>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">发送文字</div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <textarea name="message" class="form-control" rows="3" placeholder="输入你想传输的一段话或网址..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">发送文字</button>
                    </form>
                    <hr>
                    <h5>剪贴板历史</h5>
                    <ul class="list-group">
                        {% for msg in messages|reverse %}
                        <li class="list-group-item">{{ msg }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">传输文件 / 图片</div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" name="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">上传文件</button>
                    </form>
                    <hr>
                    <h5>文件列表</h5>
                    <ul class="list-group">
                        {% for file in files %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-truncate" style="max-width: 70%;">{{ file }}</span>
                            <a href="{{ url_for('download', filename=file) }}" class="btn btn-sm btn-outline-success">下载</a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
